    <meta charset="UTF-8">

    <title>Thank You | Uniimize</title>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">

        href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .cs-visual:not(.img-loaded),
        .service-visual:not(.img-loaded),
        .blog-card-image:not(.img-loaded),
        .post-image-container:not(.img-loaded),
        .team-photo:not(.img-loaded),
        .big-hero-image:not(.img-loaded) {
            background: linear-gradient(90deg, var(--clr-card) 25%, var(--clr-border) 50%, var(--clr-card) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        .cs-visual.img-loaded,
        .service-visual.img-loaded,
        .blog-card-image.img-loaded,
        .post-image-container.img-loaded,
        .team-photo.img-loaded,
        .big-hero-image.img-loaded {
            animation: none;
            background: none;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .cs-visual, .service-visual, .blog-card-image, .post-image-container, .team-photo, .big-hero-image {
            background: linear-gradient(90deg, var(--clr-card) 25%, var(--clr-border) 50%, var(--clr-card) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        

        img {
            border-radius: 25px;
        }

        ::-moz-selection {
            background: var(--clr-blue);
            color: var(--clr-cream);
        }

        ::selection {
            background: var(--clr-blue);
            color: var(--clr-cream);
        }

        /* Exact same global CSS as index.html */
        :root {
            --clr-cream: #FDF0D5;
            --clr-blue: #00A8E8;
            --clr-black: #0A0A0A;
            --clr-dark: #1A1A1A;
            --clr-muted: #6B6B6B;
            --clr-border: #E8DFC8;
            --clr-card: #F5E6C0;
            --clr-blue-light: #E6F6FD;
            --font-head: 'Instrument Serif', serif;
            --font-body: 'Inter', sans-serif;
            --transition: 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            font-family: var(--font-body);
            background-color: var(--clr-cream);
            color: var(--clr-muted);
            line-height: 1.8;
            font-size: 16px;
            opacity: 1;
            
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        body.loaded {
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        h1 {
            font-family: var(--font-head);
            color: var(--clr-black);
            font-weight: 400;
            font-size: 64px;
            letter-spacing: -0.02em;
            line-height: 1.1;
            margin-bottom: 24px;
        }

        p {
            font-size: 18px;
            margin-bottom: 40px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        a {
            color: inherit;
            text-decoration: none;
            transition: var(--transition);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 32px;
            border-radius: 8px;
            font-family: var(--font-body);
            font-weight: 500;
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition);
            border: none;
        }

        .btn-primary {
            background: var(--clr-blue);
            color: #fff;
        }

        .btn-primary:hover {
            background: #0090C8;
        }

        /* Thank You Layout */
        .thank-you-container {
            text-align: center;
            padding: 40px;
            background: var(--clr-card);
            border: 1px solid var(--clr-border);
            border-radius: 8px;
            max-width: 640px;
            width: 100%;
            margin: 24px;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: var(--clr-blue-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
            color: var(--clr-blue);
        }

        .success-icon svg {
            width: 40px;
            height: 40px;
            fill: currentColor;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 48px;
            }

            .thank-you-container {
                padding: 32px 24px;
            }
        }
    
        .cs-visual img, .service-visual img, .blog-card-image img, .post-image-container img, .team-photo img, .big-hero-image img {
            border-radius: 0 !important;
        }
    
    </style>

<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TZ3K2D48"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <div class="thank-you-container">
        <div class="success-icon">
            <svg viewBox="0 0 24 24">
                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" />
            </svg>
        </div>
        <h1>Application Received.</h1>
        <p>You have been registered successfully. Please look out for an email from our team within 24 hours to schedule
            your call.
        </p>
        <a href="/" class="btn btn-primary">&larr; Back to Homepage</a>
    </div>


    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            document.querySelectorAll(".cs-visual img, .service-visual img, .blog-card-image img, .post-image-container img, .team-photo img, .big-hero-image img").forEach(img => {
                const container = img.closest(".cs-visual, .service-visual, .blog-card-image, .post-image-container, .team-photo, .big-hero-image");
                if (!container) return;
                const markLoaded = () => container.classList.add("img-loaded");
                if (img.complete && img.naturalWidth > 0) {
                    markLoaded();
                } else {
                    img.addEventListener("load", markLoaded);
                    img.addEventListener("error", markLoaded);
                }
            });
        });
    </script>

    <script>window.addEventListener("load", function(){ document.body.classList.add("loaded"); });</script>
</body>

</html>
