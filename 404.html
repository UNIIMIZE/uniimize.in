<!DOCTYPE html>
<html lang="en-GB">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Uniimize</title>
    <meta name="robots" content="noindex, follow">

    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">

    <style>
        ::-moz-selection {
            background: var(--clr-blue);
            color: var(--clr-cream);
        }

        ::selection {
            background: var(--clr-blue);
            color: var(--clr-cream);
        }

        :root {
            --clr-cream: #FDF0D5;
            --clr-blue: #00A8E8;
            --clr-black: #0A0A0A;
            --clr-dark: #1A1A1A;
            --clr-muted: #6B6B6B;
            --clr-border: #E8DFC8;
            --clr-card: #F5E6C0;
            --clr-blue-light: #E6F6FD;
            --font-head: 'Instrument Serif', serif;
            --font-body: 'Inter', sans-serif;
            --transition: 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--clr-cream);
            color: var(--clr-muted);
            line-height: 1.8;
            font-size: 16px;
            opacity: 0;
            animation: fadeIn 0.4s ease forwards;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 2;
        }

        h1 {
            font-family: var(--font-head);
            color: var(--clr-black);
            font-weight: 400;
            font-size: 160px;
            letter-spacing: -0.02em;
            line-height: 1;
            margin-bottom: 8px;
            position: relative;
        }

        h2 {
            font-family: var(--font-head);
            font-size: 40px;
            color: var(--clr-black);
            margin-bottom: 24px;
        }

        p {
            font-size: 18px;
            margin-bottom: 40px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        a {
            color: inherit;
            text-decoration: none;
            transition: var(--transition);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 32px;
            border-radius: 8px;
            font-family: var(--font-body);
            font-weight: 500;
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition);
            border: none;
        }

        .btn-primary {
            background: var(--clr-blue);
            color: #fff;
        }

        .btn-primary:hover {
            background: #0090C8;
            transform: translateY(-2px);
        }

        /* UFO Animation */
        .ufo-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            animation: orbit 12s cubic-bezier(0.36, 0, 0.64, 1) infinite;
        }

        .ufo {
            font-size: 64px;
            position: absolute;
            top: -120px;
            left: -80px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes orbit {
            0% { transform: translate(-50%, -50%) rotate(0deg) scale(1) translateX(250px) rotate(0deg); }
            50% { transform: translate(-50%, -50%) rotate(180deg) scale(0.6) translateX(150px) rotate(-180deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg) scale(1) translateX(250px) rotate(-360deg); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-10deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        @media (max-width: 768px) {
            h1 { font-size: 100px; }
            @keyframes orbit {
                0% { transform: translate(-50%, -50%) rotate(0deg) scale(1) translateX(150px) rotate(0deg); }
                50% { transform: translate(-50%, -50%) rotate(180deg) scale(0.5) translateX(100px) rotate(-180deg); }
                100% { transform: translate(-50%, -50%) rotate(360deg) scale(1) translateX(150px) rotate(-360deg); }
            }
        }
    </style>
</head>

<body>

    <div class="ufo-wrapper">
        <div class="ufo">🛸</div>
    </div>

    <div class="container">
        <h1>404</h1>
        <h2>Lost in Space?</h2>
        <p>The page you're looking for seems to have been abducted by aliens, or it never existed in the first place.</p>
        <a href="index.html" class="btn btn-primary">&larr; Return to Base</a>
    </div>

</body>

</html>
